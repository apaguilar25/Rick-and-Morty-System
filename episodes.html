<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Episodios — Rick and Morty System</title>
  <meta name="description" content="Explora todos los episodios de Rick and Morty" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Rubik:wght@500;700;900&family=Rubik+Mono+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="/favicon.ico" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <header id="appHeader" class="app-header"></header>
  <main class="container">
    <span class="badge-chip">🎬 Season Select</span><h1 class="page-title">Episodios</h1>
    <p class="page-subtitle">Consulta, busca y ordena los episodios de la serie.</p>

    <div class="toolbar">
      <input id="search" class="search" type="search" placeholder="Buscar por nombre…" aria-label="Buscar episodio por nombre" />
    </div>

    <div id="loading" class="loading"><span class="spinner"></span> Cargando episodios…</div>
    <div id="tableWrap" class="table-wrap" style="display:none;">
      <div class="table-scroll">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div id="pagination" class="pagination"></div>
    <div id="error"></div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/table.js"></script>
  <script>
    window.Auth.require();
    (async () => {
      try {
        const { results, fromCache } = await window.API.fetchAll('episode');
        document.getElementById('loading').style.display = 'none';
        document.getElementById('tableWrap').style.display = 'block';
        if (fromCache) {
          document.getElementById('error').innerHTML =
            `<div class="alert info" style="margin-top:1rem;">Mostrando datos desde caché (modo offline).</div>`;
        }
        window.TableView({
          data: results,
          columns: [
            { key: 'id', label: 'ID' },
            { key: 'name', label: 'Nombre' },
            { key: 'air_date', label: 'Fecha de emisión' },
            { key: 'episode', label: 'Código' },
          ],
          searchField: 'name',
          pageSize: 20,
          tbodyEl: document.getElementById('tbody'),
          theadEl: document.getElementById('thead'),
          searchEl: document.getElementById('search'),
          paginationEl: document.getElementById('pagination'),
          onRowClick: (id) => location.href = `/episode.html?id=${id}`
        });
      } catch {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').innerHTML =
          `<div class="alert error">No se pudieron cargar los episodios.</div>`;
      }
    })();
  </script>
</body>
</html>
