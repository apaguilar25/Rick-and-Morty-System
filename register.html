<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear cuenta — Rick and Morty System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Rubik:wght@500;700;900&family=Rubik+Mono+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="/favicon.ico" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <main class="auth-wrap">
    <div class="auth-topbar">
      <button id="themeBtn" class="btn btn-icon" aria-label="Cambiar tema" title="Cambiar tema">🌙</button>
    </div>

    <section class="auth-card">
      <div class="auth-portal-deco" aria-hidden="true"></div>

      <h1 class="auth-title">Rick &amp; Morty <span class="acento-oliva">System</span></h1>
      <p class="auth-sub">▶ CREA TU PERFIL</p>


      <div id="alert" role="alert" aria-live="polite"></div>

      <form id="regForm" novalidate>
        <div class="form-field">
          <label for="username">🕹 Usuario</label>
          <input id="username" type="text" required minlength="3" autocomplete="username" placeholder="pickle_rick" />
        </div>
        <div class="form-field">
          <label for="email">📡 Email</label>
          <input id="email" type="email" required autocomplete="email" placeholder="rick@c137.com" />
        </div>
        <div class="form-field">
          <label for="password">🔑 Contraseña</label>
          <input id="password" type="password" required minlength="6" autocomplete="new-password" placeholder="mínimo 6 caracteres" />
          <div class="power-meter"><div id="powerFill" class="power-meter-fill"></div></div>
          <div class="power-meter-label">
            <span>Password Power</span>
            <span class="lvl" id="powerLbl">Weak</span>
          </div>
        </div>


        <div class="form-actions">
          <button type="submit" class="btn btn-primary">✚ Crear cuenta</button>
        </div>
      </form>

      <p class="form-alt">¿Ya tienes cuenta? <a href="/login.html">Iniciar sesión</a></p>
    </section>
    <p class="auth-footer">Desarrollado por Andrea Aguilar</p>

  </main>

  <script src="/js/auth.js"></script>
  <script>
    const u = document.getElementById('username');
    const em = document.getElementById('email');
    const pw = document.getElementById('password');
    const powerFill = document.getElementById('powerFill');
    const powerLbl = document.getElementById('powerLbl');

    // Progreso continuo: crece con cada carácter y llega a "Strong" con 6.
    const RANKS = ['Weak', 'Low', 'Mid', 'High', 'Strong', 'Legendary'];
    function update() {
      const len = pw.value.length;
      const pct = Math.min(100, Math.round((len / 6) * 83 + Math.max(0, len - 6) * 8.5));
      powerFill.style.width = pct + '%';
      const idx = Math.min(RANKS.length - 1, Math.floor(pct / 17));
      powerLbl.textContent = RANKS[idx];
    }
    pw.addEventListener('input', update);

    document.getElementById('regForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const alertBox = document.getElementById('alert');
      alertBox.innerHTML = '';
      if (pw.value.length < 6) {
        return alertBox.innerHTML = `<div class="alert error">✘ La contraseña debe tener mínimo 6 caracteres</div>`;
      }
      const res = window.Auth.register({ username: u.value.trim(), email: em.value.trim(), password: pw.value });
      if (!res.ok) return alertBox.innerHTML = `<div class="alert error">✘ ${res.error}</div>`;
      window.Auth.login(u.value.trim(), pw.value);

      alertBox.innerHTML = `<div class="alert success">✔ Cuenta creada · Entrando al multiverso…</div>`;
      setTimeout(() => location.href = '/characters.html', 600);
    });
  </script>

</body>
</html>
